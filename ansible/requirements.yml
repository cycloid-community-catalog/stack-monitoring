---
roles:
  - src: https://github.com/geerlingguy/ansible-role-docker
    version: master
    name: geerlingguy.docker
    scm: git

  - src: https://github.com/jdauphant/ansible-role-nginx.git
    name: jdauphant.nginx
    scm: git

collections:
  # Install a collection from Ansible Galaxy.
  # https://github.com/prometheus-community/ansible/tags
  - name: prometheus.prometheus
    version: "0.27.6"
    source: https://galaxy.ansible.com

  # Install a collection of grafana
  # https://github.com/grafana/grafana-ansible-collection/tags
  - name: grafana.grafana
    version: "6.0.6"
    source: https://galaxy.ansible.com
